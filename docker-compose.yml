version: "3"

services:
  app:
    image: thecodingmachine/php:8.0-v4-fpm
    container_name: "${PROJECT_NAME}-php"
    depends_on:
      - db
    volumes:
      - ./:/var/www/html:rw,cached
      - ./docker/php/conf.d/api-platform.dev.ini:/usr/local/etc/php/conf.d/api-platform.ini
    environment:
      APP_ENV: "${APP_ENV}"
      DATABASE_URL: "postgres://${DB_USER}:${DB_PWD}@${PROJECT_NAME}-db:5432/${DB_NAME}?sslmode=disable&charset=utf8"
      PROVIDER_API: "${PROVIDER_API}"
      PROVIDER_API_KEY: "${PROVIDER_API_KEY}"
      PROVIDER_API_SECRET: "${PROVIDER_API_SECRET}"
      PHP_EXTENSIONS: "pdo_pgsql pgsql pdo_sqlite sqlite3 gd intl xdebug"
      PHP_INI_MEMORY_LIMIT: -1
      PHP_INI_XDEBUG__MODE: "debug"
      PHP_INI_XDEBUG__CLIENT_PORT: 9003
      PHP_INI_XDEBUG__IDEKEY: "${XDEBUG_IDEKEY}"
      PHP_EXTENSION_XDEBUG: 1

      STARTUP_COMMAND_1: composer install
      STARTUP_COMMAND_2: echo 'alias sf="php bin/console"' >> ~/.bashrc
      STARTUP_COMMAND_3: echo 'alias phpunit="php vendor/bin/simple-phpunit"' >> ~/.bashrc
    restart: unless-stopped

  caddy:
    build:
      context: ./docker/caddy
      target: caddy
    container_name: "${PROJECT_NAME}-caddy"
    volumes:
      - ./:/var/www/html:rw
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      PROJECT_HOST: ${PROJECT_HOST}
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY}
      MERCURE_PUBLISHER_JWT_ALG: ${MERCURE_PUBLISHER_JWT_ALG}
      MERCURE_SUBSCRIBER_JWT_ALG: ${MERCURE_SUBSCRIBER_JWT_ALG}
      MERCURE_EXTRA_DIRECTIVES: demo /srv/mercure-assets/
    ports:
      # HTTP
      - target: 80
        published: 80
        protocol: tcp
      # HTTPS
      - target: 443
        published: 443
        protocol: tcp
      # HTTP/3
      - target: 443
        published: 443
        protocol: udp
    restart: unless-stopped

  db:
    image: postgres
    container_name: "${PROJECT_NAME}-db"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data:rw
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
